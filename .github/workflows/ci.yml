name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel outdated runs on new pushes to the same ref — pull requests
# and feature branches churn, so save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Free disk space and add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo rm -rf /usr/local/share/powershell /usr/share/swift 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 24G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (strict)
        run: npm run build
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=16384'
          GENERATE_SOURCEMAP: 'false'

      - name: Upload build artifact (on failure, for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs-node22
          path: |
            .docusaurus/
            build/
          retention-days: 3

  compat:
    name: Compatibility check (Node 20 LTS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (strict)
        run: npm run build
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=8192'
          GENERATE_SOURCEMAP: 'false'
