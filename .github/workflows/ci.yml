name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel outdated runs on new pushes to the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build (strict)
        run: npm run build
        env:
          CI: 'true'

      - name: Upload build artifact (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            .docusaurus/
            build/
          retention-days: 3

  link-check:
    name: Typecheck with Node 20 (compatibility floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (strict)
        run: npm run build
        env:
          CI: 'true'
