name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue deploys; don't cancel an in-flight deploy with a newer push —
# GitHub Pages expects a stable publish pipeline.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      # GitHub Actions runners ship ~14 GB free disk and 7 GB memory,
      # which isn't enough headroom for Docusaurus production builds
      # with the search plugin's index. Free disk and add swap.
      - name: Free disk space and add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo rm -rf /usr/local/share/powershell /usr/share/swift 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 24G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Memory:"; free -h
          echo "Disk:"; df -h /

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (strict — fails on broken links / anchors / markdown)
        run: npm run build
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=16384'
          GENERATE_SOURCEMAP: 'false'
          GH_PAGES_URL: ${{ vars.GH_PAGES_URL || 'https://verum-lang.org' }}
          GH_PAGES_BASE_URL: ${{ vars.GH_PAGES_BASE_URL || '/' }}
          GH_ORG_NAME: ${{ github.repository_owner }}
          GH_PROJECT_NAME: ${{ github.event.repository.name }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
